services:
  - type: web
    name: match3-backend
    env: node
    buildCommand: npm install
    startCommand: npx ts-node src/index.ts
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: BOT_TOKEN
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: NODE_ENV
        value: production